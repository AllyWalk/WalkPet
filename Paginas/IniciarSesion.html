<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WalkPet - Clínica Veterinaria & Software</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="antialiased">
<div class="min-h-screen bg-gradient-to-br from-[#FAFAFF] via-[#F5F3FF] to-[#EFF6FF] flex items-center justify-center p-4 sm:p-6 font-sans relative">
    
    <div id="contenedor-alertas" class="fixed top-5 right-5 z-50 space-y-3 pointer-events-none"></div>

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden transition-all duration-300 hover:shadow-2xl relative">
        
        <div class="h-2 w-full bg-gradient-to-r from-blue-500 via-violet-600 to-emerald-500"></div>

        <div id="vista-login" class="p-8 transition-all duration-300 opacity-100 transform scale-100">
            <div class="text-center mb-8">
                <div class="w-12 h-12 bg-violet-100 rounded-2xl flex items-center justify-center mx-auto mb-3 shadow-sm shadow-violet-200">
                    <i data-lucide="lock" class="w-6 h-6 text-violet-600"></i>
                </div>
                <h2 class="text-2xl font-black text-gray-800 tracking-tight">¡Bienvenido de nuevo!</h2>
                <p class="text-xs text-gray-400 mt-1">Ingresa tus credenciales para acceder a tu cuenta</p>
            </div>

            <form id="form-login" class="space-y-5">
                <div>
                    <label for="login-email" class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">Correo Electrónico</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
                            <i data-lucide="mail" class="w-4 h-4"></i>
                        </span>
                        <input type="email" id="login-email" name="email" autocomplete="username" placeholder="ejemplo@correo.com" class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 text-sm rounded-xl focus:outline-none focus:ring-2 focus:ring-violet-600 focus:border-transparent placeholder-gray-400 transition-all">
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label for="login-password" class="block text-xs font-bold uppercase tracking-wider text-gray-500">Contraseña</label>
                        <button type="button" id="btn-ir-olvido" class="text-xs font-semibold text-blue-600 hover:text-blue-800 transition-colors focus:outline-none">¿Olvidaste tu contraseña?</button>
                    </div>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
                            <i data-lucide="key-round" class="w-4 h-4"></i>
                        </span>
                        <input type="password" id="login-password" name="password" autocomplete="current-password" placeholder="••••••••" class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 text-sm rounded-xl focus:outline-none focus:ring-2 focus:ring-violet-600 focus:border-transparent placeholder-gray-400 transition-all">
                    </div>
                </div>

                <div class="flex items-center">
                    <input id="recuerdame" name="remember" type="checkbox" class="w-4 h-4 text-violet-600 border-gray-300 rounded focus:ring-violet-500 accent-violet-600">
                    <label for="recuerdame" class="ml-2 text-xs font-medium text-gray-500 cursor-pointer select-none">Recordar mi sesión</label>
                </div>

                <button type="submit" class="w-full bg-violet-700 hover:bg-violet-800 text-white font-bold py-3 rounded-xl text-xs uppercase tracking-wider transition-colors shadow-lg shadow-violet-100 flex items-center justify-center gap-2">
                    Inicia Sesión <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </form>

            <div class="mt-8 text-center border-t border-gray-100 pt-6">
                <p class="text-xs text-gray-500">
                    ¿No tienes una cuenta? 
                    <button id="btn-ir-registro" class="font-bold text-emerald-600 hover:text-emerald-700 transition-colors ml-1 focus:outline-none">Regístrate</button>
                </p>
            </div>
        </div>

        <div id="vista-registro" class="p-8 hidden opacity-0 transform scale-95 transition-all duration-300">
            <div class="text-center mb-6">
                <div class="w-12 h-12 bg-emerald-100 rounded-2xl flex items-center justify-center mx-auto mb-3 shadow-sm shadow-emerald-200">
                    <i data-lucide="user-plus" class="w-6 h-6 text-emerald-600"></i>
                </div>
                <h2 class="text-2xl font-black text-gray-800 tracking-tight">Crea tu cuenta</h2>
                <p class="text-xs text-gray-400 mt-1">Únete a nosotros y disfruta de todos los beneficios</p>
            </div>

            <form id="form-registro" class="space-y-4">
                <div>
                    <label for="reg-name" class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1.5">Nombre Completo</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
                            <i data-lucide="user" class="w-4 h-4"></i>
                        </span>
                        <input type="text" id="reg-name" name="name" autocomplete="name" placeholder="Tu nombre" class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 text-sm rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-600 focus:border-transparent placeholder-gray-400 transition-all">
                    </div>
                </div>

                <div>
                    <label for="reg-email" class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1.5">Correo Electrónico</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
                            <i data-lucide="mail" class="w-4 h-4"></i>
                        </span>
                        <input type="email" id="reg-email" name="email" autocomplete="email" placeholder="ejemplo@correo.com" class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 text-sm rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-600 focus:border-transparent placeholder-gray-400 transition-all">
                    </div>
                </div>

                <div>
                    <label for="reg-password" class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1.5">Contraseña</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
                            <i data-lucide="key-round" class="w-4 h-4"></i>
                        </span>
                        <input type="password" id="reg-password" name="password" autocomplete="new-password" placeholder="Mínimo 8 caracteres" class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 text-sm rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-600 focus:border-transparent placeholder-gray-400 transition-all">
                    </div>
                </div>

                <div>
                    <label for="reg-phone" class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1.5">Número Telefónico</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
                            <i data-lucide="phone" class="w-4 h-4"></i>
                        </span>
                        <input type="tel" id="reg-phone" name="phone" autocomplete="tel" placeholder="Ej. 4492988855" class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 text-sm rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-600 focus:border-transparent placeholder-gray-400 transition-all">
                    </div>
                </div>

                <div class="flex items-start">
                    <input id="terminos" name="terms" type="checkbox" class="mt-0.5 w-4 h-4 text-emerald-600 border-gray-300 rounded focus:ring-emerald-500 accent-emerald-600">
                    <label for="terminos" class="ml-2 text-xs font-medium text-gray-500 cursor-pointer select-none leading-relaxed">Acepto los <a href="#" class="text-blue-600 hover:underline">Términos de Servicio</a> y la <a href="#" class="text-blue-600 hover:underline">Política de Privacidad</a>.</label>
                </div>

                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl text-xs uppercase tracking-wider transition-colors shadow-lg shadow-emerald-100 flex items-center justify-center gap-2 mt-2">
                    Registrar Cuenta <i data-lucide="check" class="w-4 h-4"></i>
                </button>
            </form>

            <div class="mt-6 text-center border-t border-gray-100 pt-5">
                <p class="text-xs text-gray-500">
                    ¿Ya tienes una cuenta? 
                    <button id="btn-volver-login-1" class="font-bold text-violet-600 hover:text-violet-700 transition-colors ml-1 focus:outline-none">Inicia Sesión</button>
                </p>
            </div>
        </div>

        <div id="vista-olvido" class="p-8 hidden opacity-0 transform scale-95 transition-all duration-300">
            <div class="text-center mb-8">
                <div class="w-12 h-12 bg-blue-100 rounded-2xl flex items-center justify-center mx-auto mb-3 shadow-sm shadow-blue-200">
                    <i data-lucide="refresh-cw" class="w-6 h-6 text-blue-600"></i>
                </div>
                <h2 class="text-2xl font-black text-gray-800 tracking-tight">Recuperar contraseña</h2>
                <p class="text-xs text-gray-400 mt-1">Te enviaremos un correo con un enlace de restablecimiento seguro.</p>
            </div>

            <form id="form-olvido" class="space-y-6">
                <div>
                    <label for="forgot-email" class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">Tu Correo Electrónico</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
                            <i data-lucide="mail" class="w-4 h-4"></i>
                        </span>
                        <input type="email" id="forgot-email" name="email" placeholder="ejemplo@correo.com" class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 text-sm rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent placeholder-gray-400 transition-all">
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl text-xs uppercase tracking-wider transition-colors shadow-lg shadow-blue-100 flex items-center justify-center gap-2">
                    Enviar Instrucciones <i data-lucide="send" class="w-4 h-4"></i>
                </button>
            </form>

            <div class="mt-8 text-center border-t border-gray-100 pt-6">
                <button id="btn-volver-login-2" class="inline-flex items-center gap-1.5 text-xs font-bold text-gray-500 hover:text-gray-700 transition-colors focus:outline-none">
                    <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i> Volver al Inicio de Sesión
                </button>
            </div>
        </div>

    </div>
</div>

  <a href="/index.html" 
     aria-label="Regresar al inicio" 
     class="fixed bottom-6 right-6 z-50 bg-violet-700 hover:bg-violet-800 text-white p-3 rounded-xl shadow-lg transition-all duration-300 hover:scale-110 flex items-center justify-center border border-violet-600/50 group no-underline">
      <i data-lucide="home" class="w-5 h-5"></i>
  </a>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        // Inicializar iconos de Lucide al cargar la app
        lucide.createIcons();

        // Elementos de las vistas
        const vistaLogin = document.getElementById("vista-login");
        const vistaRegistro = document.getElementById("vista-registro");
        const vistaOlvido = document.getElementById("vista-olvido");

        // Formularios
        const formLogin = document.getElementById("form-login");
        const formRegistro = document.getElementById("form-registro");
        const formOlvido = document.getElementById("form-olvido");

        // Botones de acción de navegación
        const btnIrRegistro = document.getElementById("btn-ir-registro");
        const btnIrOlvido = document.getElementById("btn-ir-olvido");
        const btnVolverLogin1 = document.getElementById("btn-volver-login-1");
        const btnVolverLogin2 = document.getElementById("btn-volver-login-2");

        // Contenedor para los mensajes informativos flotantes
        const contenedorAlertas = document.getElementById("contenedor-alertas");

        // Función para mostrar mensajes dinámicos flotantes (Toast)
        function mostrarMensaje(texto, colorClase) {
            const alerta = document.createElement("div");
            alerta.className = `p-4 text-xs font-bold text-white ${colorClase} rounded-xl shadow-lg transition-all duration-300 opacity-0 transform translate-y-2 flex items-center gap-2 pointer-events-auto`;
            alerta.innerHTML = `<i data-lucide="info" class="w-4 h-4"></i> <span>${texto}</span>`;
            
            contenedorAlertas.appendChild(alerta);
            lucide.createIcons(); // Renderiza los nuevos iconos inyectados

            // Forzar reflow para animación de entrada
            setTimeout(() => {
                alerta.classList.remove("opacity-0", "translate-y-2");
            }, 10);

            // Desvanecer y remover después de 3.5 segundos
            setTimeout(() => {
                alerta.classList.add("opacity-0", "translate-y-2");
                setTimeout(() => alerta.remove(), 300);
            }, 3500);
        }

        // Función reutilizable para cambiar de pantalla con animación fluida
        function cambiarVista(vistaAOcultar, vistaAMostrar) {
            vistaAOcultar.classList.add("opacity-0", "scale-95");
            vistaAOcultar.classList.remove("scale-100");
            
            setTimeout(() => {
                vistaAOcultar.classList.add("hidden");
                vistaAMostrar.classList.remove("hidden");
                
                setTimeout(() => {
                    vistaAMostrar.classList.remove("opacity-0", "scale-95");
                    vistaAMostrar.classList.add("scale-100");
                }, 20);
            }, 200);
        }

        // Eventos para interactuar entre pantallas convencionales
        btnIrRegistro.addEventListener("click", () => cambiarVista(vistaLogin, vistaRegistro));
        btnIrOlvido.addEventListener("click", () => cambiarVista(vistaLogin, vistaOlvido));
        btnVolverLogin1.addEventListener("click", () => cambiarVista(vistaRegistro, vistaLogin));
        btnVolverLogin2.addEventListener("click", () => cambiarVista(vistaOlvido, vistaLogin));

        // ACCIÓN: Envío de Login (Redirección directa sin validar)
        formLogin.addEventListener("submit", (e) => {
            e.preventDefault();
            window.location.href = "perfilUsuarios.html";
        });

        // ACCIÓN: Envío de Registro (Volver a login + Mensaje exitoso sin validar)
        formRegistro.addEventListener("submit", (e) => {
            e.preventDefault();
            formRegistro.reset(); 
            cambiarVista(vistaRegistro, vistaLogin);
            mostrarMensaje("Registrado con éxito", "bg-emerald-600");
        });

        // ACCIÓN: Recuperar contraseña (Mensaje de envío exitoso sin validar)
        formOlvido.addEventListener("submit", (e) => {
            e.preventDefault();
            formOlvido.reset(); 
            mostrarMensaje("Envío exitoso", "bg-blue-600");
        });
    });
</script>
</body>
</html>
