<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compras | WalkPet Software</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50">

    <div id="header-container"></div>

    <main class="py-16 px-6 max-w-4xl mx-auto">
        <h1 class="text-3xl font-black text-gray-800 mb-8 flex items-center gap-3">
            <i data-lucide="shopping-bag" class="w-8 h-8 text-violet-700"></i> Mi Carrito
        </h1>

        <div class="bg-white rounded-3xl border border-gray-100 shadow-sm p-6 lg:p-8">
            <div id="carrito-items" class="space-y-6">
                
                <div class="flex items-center gap-4 border-b border-gray-100 pb-6">
                    <div class="w-20 h-20 bg-gray-50 rounded-xl flex items-center justify-center p-2">
                        <img src="/images/Cama ortopedica.jpg" alt="Cama Ortopédica" class="w-16 h-16 object-contain">
                    </div>
                    <div class="flex-1">
                        <h3 class="font-bold text-gray-800">Cama Ortopédica Memory Foam</h3>
                        <p class="text-sm text-gray-500">$650.00</p>
                    </div>
                    <div class="text-right">
                        <span class="font-black text-gray-800 block">x1</span>
                        <button class="text-red-500 text-xs font-bold hover:underline">Eliminar</button>
                    </div>
                </div>

                <div class="flex items-center gap-4 border-b border-gray-100 pb-6">
                    <div class="w-20 h-20 bg-gray-50 rounded-xl flex items-center justify-center p-2">
                        <img src="/images/Dispensador.jpg" alt="Juguete Dispensador" class="w-16 h-16 object-contain">
                    </div>
                    <div class="flex-1">
                        <h3 class="font-bold text-gray-800">Juguete Dispensador de Premios</h3>
                        <p class="text-sm text-gray-500">$120.00</p>
                    </div>
                    <div class="text-right">
                        <span class="font-black text-gray-800 block">x1</span>
                        <button class="text-red-500 text-xs font-bold hover:underline">Eliminar</button>
                    </div>
                </div>

            </div>

            <div class="mt-8 pt-6 border-t border-gray-200">
                <div class="flex justify-between text-lg font-black text-gray-800 mb-6">
                    <span>Total</span>
                    <span id="total-carrito">$770.00</span>
                </div>
                <button class="w-full bg-violet-700 hover:bg-violet-800 text-white font-black py-4 rounded-2xl transition-all shadow-lg shadow-violet-200">
                    Finalizar Compra
                </button>
            </div>
        </div>
    </main>

    <div class="fixed bottom-6 right-6 z-50">
        <a href="Catalogo.html" class="bg-white hover:bg-gray-50 text-gray-800 p-4 rounded-full shadow-xl border border-gray-200 flex items-center justify-center transition-all hover:scale-110">
            <i data-lucide="arrow-left" class="w-6 h-6"></i>
        </a>
    </div>

    <script>
        fetch('/header.html').then(r => r.text()).then(d => {
            document.getElementById('header-container').innerHTML = d;
            lucide.createIcons();
        });
    </script>
</body>
</html>
